<!DOCTYPE html>
<html>
<head>
    <title>Insurance AI Analyzer</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(0, 212, 255, 0.22), transparent 35%),
                radial-gradient(circle at bottom right, rgba(25, 255, 155, 0.20), transparent 35%),
                linear-gradient(135deg, #06111f, #0b2433, #10291f);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .glass {
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(18px);
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 22px 70px rgba(0,0,0,0.38);
        }

        .brand-gradient {
            background: linear-gradient(135deg, #00d4ff, #19ff9b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-glow {
            background: linear-gradient(135deg, #00d4ff, #19b56f);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            transition: 0.3s ease;
        }

        .btn-glow:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 14px 35px rgba(0,212,255,0.32);
        }

        .nav-link-custom {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            margin-right: 16px;
            font-weight: 600;
        }

        .nav-link-custom:hover {
            color: #00d4ff;
        }

        .card-box {
            padding: 24px;
            border-radius: 22px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.16);
            transition: 0.3s ease;
        }

        .card-box:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.14);
        }

        .text-muted-custom {
            color: rgba(255,255,255,0.68);
        }

        .form-control {
            background: rgba(255,255,255,0.10);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 14px;
            padding: 12px 15px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.14);
            color: white;
            border-color: #00d4ff;
            box-shadow: 0 0 0 4px rgba(0,212,255,0.14);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.55);
        }

        table {
            border-radius: 18px;
            overflow: hidden;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold brand-gradient fs-4" href="{% url 'index' %}">

        <i class="bi bi-shield-check"></i> Insurance AI Analyzer
    </a>

    <div class="ms-auto d-flex align-items-center">
        {% if user.is_authenticated %}
            <a href="{% url 'index' %}" class="nav-link-custom">


                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="{% url 'upload_policy' %}" class="nav-link-custom">
                <i class="bi bi-cloud-upload"></i> Upload
            </a>

            <a href="{% url 'recommend' %}" class="nav-link-custom">
                <i class="bi bi-stars"></i> Recommendations
            </a>

            <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button class="btn btn-sm btn-outline-danger rounded-pill px-3">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-outline-info rounded-pill me-2 px-3">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-sm btn-glow rounded-pill px-3">
                Register
            </a>
        {% endif %}
    </div>
</nav>

<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>

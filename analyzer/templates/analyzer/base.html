<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}InsureAI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #0d6efd 100%); }
    .card { background: white; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 1.5rem; }
    .btn-primary { background: rgb(29 78 216); color: white; padding: 0.75rem 1.5rem; border-radius: 1rem; font-weight: 600; }
    .btn-primary:hover { background: rgb(30 64 175); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="gradient-bg text-white px-6 py-4 flex items-center justify-between shadow-lg">
    <a href="/" class="text-2xl font-bold">🛡️ InsureAI</a>
    <div class="flex gap-4 text-sm">
      <a href="/upload/" class="hover:text-blue-200">Upload Policy</a>
      <a href="/compare/" class="hover:text-blue-200">Compare</a>
      <a href="/recommend/" class="hover:text-blue-200">Get Recommendations</a>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>

{% extends 'analyzer/base.html' %}
{% block title %}Register - InsureAI{% endblock %}
{% block content %}

<div class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <div class="text-center mb-8">
        <div class="text-4xl mb-4">👤</div>
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h2>
        <p class="text-gray-600">Register to use the Insurance AI Analyzer</p>
      </div>

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Username</label>
          <input type="text" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Choose username" required>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Password</label>
          <input type="password" name="password1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Create password" required>
        </div>

        <div>
          <label class="block text-gray-700 font-semibold mb-2">Confirm Password</label>
          <input type="password" name="password2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Confirm password" required>
        </div>

        {% if error %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
            {{ error }}
          </div>
        {% endif %}

        <button type="submit" class="w-full bg-green-600 text-white font-semibold py-3 rounded-lg hover:bg-green-700 transition mt-6">
          ✓ Register
        </button>
      </form>

      <p class="text-center mt-6 text-gray-600">
        Already have an account?
        <a href="{% url 'login' %}" class="text-blue-600 font-semibold hover:text-blue-700">
          Login
        </a>
      </p>

      <p class="text-center mt-4 text-gray-600">
        <a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-800">
          Back to home
        </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}

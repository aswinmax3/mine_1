{% extends 'analyzer/base.html' %}
{% block title %}Check a Claim{% endblock %}
{% block content %}
<h1 class="text-3xl font-bold mb-2">📋 Claim Approval Checker</h1>
<p class="text-gray-500 mb-6">{{doc.name}}</p>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <label class="block font-semibold mb-2">Describe your claim situation</label>
    <textarea name="claim_description" rows="5" class="w-full border rounded-xl p-3 mb-4" placeholder="e.g. I had a knee replacement surgery after an accident..."></textarea>
    <button type="submit" class="btn-primary w-full">🤖 Predict Claim Outcome</button>
  </form>
</div>
{% endblock %}

{% extends 'analyzer/base.html' %}
{% block title %}Premium Calculator — InsureAI{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <h2 style="margin-bottom:0.5rem;">Premium Calculator</h2>
  <p style="color:#888; margin-bottom:2rem;">
    Get an estimated premium range before buying any policy.
  </p>

  <form method="post">
    {% csrf_token %}

    <div style="margin-bottom:1rem;">
      <label>Age</label>
      <input type="number" name="age" class="form-control" placeholder="e.g. 30" required>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Gender</label>
      <select name="gender" class="form-control">
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Smoker?</label>
      <select name="smoker" class="form-control">
        <option value="no">No</option>
        <option value="yes">Yes</option>
      </select>
    </div>

    <div style="margin-bottom:1rem;">
      <label>BMI (optional)</label>
      <input type="number" step="0.1" name="bmi" class="form-control" placeholder="e.g. 24.5">
    </div>

    <div style="margin-bottom:1rem;">
      <label>Policy Type</label>
      <select name="policy_type" class="form-control">
        <option value="Health Insurance">Health Insurance</option>
        <option value="Term Life Insurance">Term Life Insurance</option>
        <option value="Vehicle Insurance">Vehicle Insurance</option>
        <option value="Home Insurance">Home Insurance</option>
        <option value="Travel Insurance">Travel Insurance</option>
        <option value="Critical Illness">Critical Illness</option>
      </select>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Coverage Amount (₹)</label>
      <select name="coverage_amount" class="form-control">
        <option value="500000">₹5 Lakh</option>
        <option value="1000000">₹10 Lakh</option>
        <option value="2000000" selected>₹20 Lakh</option>
        <option value="5000000">₹50 Lakh</option>
        <option value="10000000">₹1 Crore</option>
      </select>
    </div>

    <div style="margin-bottom:1rem;">
      <label>City Tier</label>
      <select name="city_tier" class="form-control">
        <option value="Tier 1 (Metro - Mumbai/Delhi/Bangalore)">Tier 1 — Metro</option>
        <option value="Tier 2 (Pune/Kochi/Jaipur)">Tier 2 — Mid City</option>
        <option value="Tier 3 (Small city/Town)">Tier 3 — Small City/Town</option>
      </select>
    </div>

    <div style="margin-bottom:1.5rem;">
      <label>Family Size</label>
      <select name="family_size" class="form-control">
        <option value="1">Just Me</option>
        <option value="2">2 (Self + Spouse)</option>
        <option value="3">3 Members</option>
        <option value="4">4 Members</option>
        <option value="5">5+ Members</option>
      </select>
    </div>

    <button type="submit" class="btn-primary" style="width:100%;">
      Calculate Premium Estimate
    </button>
  </form>
</div>
{% endblock %}

{% extends 'analyzer/base.html' %}
{% block title %}Get Recommendations{% endblock %}

{% block content %}
<style>
  body {
    background: #000 !important;
  }

  .recommend-page {
    margin: -24px;
    min-height: 100vh;
    background: #000;
    padding: 42px 20px;
    overflow: hidden;
  }

  .recommend-hero {
    position: relative;
    max-width: 1500px;
    margin: 0 auto;
    min-height: 90vh;
    overflow: hidden;
    background: #000;
    color: white;
    border-radius: 36px;
    padding: 70px 46px;
    box-shadow: 0 0 80px rgba(37, 99, 235, 0.25);
  }

  #lightningCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .dark-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 20%, rgba(30, 64, 175, 0.35), transparent 28%),
      radial-gradient(circle at 50% 70%, rgba(37, 99, 235, 0.20), transparent 35%),
      rgba(0, 0, 0, 0.76);
    z-index: 2;
  }

  .planet {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 720px;
    height: 720px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 25% 90%, #1e386b 15%, #030712 65%, #000 100%);
    opacity: 0.55;
    filter: blur(1px);
    z-index: 3;
  }

  .recommend-content {
    position: relative;
    z-index: 10;
  }

  .recommend-title {
    text-align: center;
    font-size: clamp(42px, 5vw, 74px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 25px;
  }

  .recommend-subtitle {
    text-align: center;
    color: rgba(255,255,255,0.65);
    font-size: 18px;
    margin-bottom: 45px;
  }

  .recommend-card {
    max-width: 1350px;
    margin: 0 auto;
    background: rgba(0, 0, 0, 0.50);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 30px;
    padding: 40px;
    backdrop-filter: blur(28px);
    box-shadow: 0 30px 100px rgba(0,0,0,0.6);
  }

  .recommend-card label {
    color: rgba(255,255,255,0.85);
    font-size: 18px;
  }

  .recommend-card input,
  .recommend-card select {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    color: white;
    outline: none;
    height: 64px;
    font-size: 18px;
  }

  .recommend-card input:focus,
  .recommend-card select:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96,165,250,0.20);
  }

  .recommend-card select option {
    color: black;
  }

  .floating-tag {
    position: absolute;
    z-index: 9;
    color: rgba(255,255,255,0.82);
    font-size: 16px;
  }

  .tag-1 { left: 7%; top: 25%; }
  .tag-2 { right: 8%; top: 27%; }

  .recommend-card .btn-primary {
    height: 66px;
    border-radius: 18px;
    font-size: 20px;
  }

  @media (max-width: 768px) {
    .recommend-page {
      margin: -16px;
      padding: 0;
    }

    .recommend-hero {
      border-radius: 0;
      padding: 45px 18px;
    }

    .recommend-card {
      padding: 24px;
    }

    .floating-tag {
      display: none;
    }

    .planet {
      width: 420px;
      height: 420px;
    }
  }
</style>

<div class="recommend-page">
  <section class="recommend-hero">
    <canvas id="lightningCanvas"></canvas>

    <div class="dark-overlay"></div>
    <div class="planet"></div>

    <div class="floating-tag tag-1">● AI Risk Analysis</div>
    <div class="floating-tag tag-2">● Smart Policy Match</div>

    <div class="recommend-content">
      <h1 class="recommend-title">✨ Insurance Policy Recommendations</h1>
      <p class="recommend-subtitle">Lightning-powered smart insurance matching system</p>

      <div class="recommend-card">
        <form method="post" action="/recommend/">
          {% csrf_token %}

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block font-semibold mb-2">Age</label>
              <input type="number" name="age" class="w-full border rounded-xl p-3" value="30" min="0">
            </div>

            <div>
              <label class="block font-semibold mb-2">Gender</label>
              <select name="gender" class="w-full border rounded-xl p-3">
                <option value="male">male</option>
                <option value="female">female</option>
              </select>
            </div>

            <div>
              <label class="block font-semibold mb-2">BMI</label>
              <input type="number" step="0.1" name="bmi" class="w-full border rounded-xl p-3" value="24.0">
            </div>

            <div>
              <label class="block font-semibold mb-2">Smoker</label>
              <select name="smoker" class="w-full border rounded-xl p-3">
                <option value="no">no</option>
                <option value="yes">yes</option>
              </select>
            </div>

            <div>
              <label class="block font-semibold mb-2">Income (annual)</label>
              <input type="number" name="income" class="w-full border rounded-xl p-3" value="500000">
            </div>

            <div>
              <label class="block font-semibold mb-2">Family Size</label>
              <input type="number" name="family_size" class="w-full border rounded-xl p-3" value="2">
            </div>

            <div>
              <label class="block font-semibold mb-2">Coverage Needed</label>
              <input type="number" name="coverage" class="w-full border rounded-xl p-3" value="2000000">
            </div>

            <div>
              <label class="block font-semibold mb-2">Budget Max (monthly)</label>
              <input type="number" name="budget" class="w-full border rounded-xl p-3" value="30000">
            </div>
          </div>

          <button type="submit" class="btn-primary mt-8 w-full text-lg">
            ✨ Get Recommendations
          </button>
        </form>
      </div>
    </div>
  </section>
</div>

<script>
  const canvas = document.getElementById("lightningCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  function drawLightning() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    let x = centerX;
    let y = 0;

    ctx.beginPath();
    ctx.moveTo(x, y);

    while (y < canvas.height) {
      x = centerX + (Math.random() - 0.5) * 90;
      y += Math.random() * 30 + 20;
      ctx.lineTo(x, y);
    }

    ctx.shadowBlur = 35;
    ctx.shadowColor = "#60a5fa";
    ctx.strokeStyle = "rgba(147,197,253,0.75)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.shadowBlur = 75;
    ctx.strokeStyle = "rgba(37,99,235,0.25)";
    ctx.lineWidth = 12;
    ctx.stroke();

    setTimeout(() => requestAnimationFrame(drawLightning), 90);
  }

  drawLightning();
</script>
{% endblock %}
